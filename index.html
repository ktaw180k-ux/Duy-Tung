<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>Thiệp Kỷ Yếu - Thanh Xuân Rực Rỡ</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;500;600;700&display=swap');

    :root{
      --gold:#d4af37;
      --gold-soft:#edd68a;
      --paper:#fffaf2;
      --paper-2:#fffdf8;
      --text:#4f453b;
      --shadow:0 20px 50px rgba(0,0,0,.18);
      --env-w:440px;
      --env-h:280px;
      --film-h:230px; 
    }

    *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body{ width:100%; height:100%; overflow:hidden; background-color:#f9f1e7; }

    body{
      font-family:'Montserrat',sans-serif;
      color:#222;
      background: linear-gradient(180deg, #9ddcff 0%, #bde9ff 22%, #eaf7ff 48%, #f9f1e7 100%);
      position:relative;
    }

    /* =========================================
       PHẦN 1: CẢNH MỞ ĐẦU (XE BƯU TÁ)
       ========================================= */
    #intro-scene { position:absolute; inset:0; z-index:30; overflow:hidden; transition:opacity .9s ease; }

    .sun{
      position:absolute; top:6.5%; right:10%; width:110px; height:110px; border-radius:50%;
      background: radial-gradient(circle at 35% 35%, #fffef4 0%, #ffe99e 34%, #ffc94b 68%, #ffb300 100%);
      box-shadow: 0 0 50px rgba(255,182,71,0.4); z-index:2; animation:sunPulse 4s ease-in-out infinite alternate;
    }

    .clouds{
      position:absolute; top:3%; left:0; width:200%; height:180px; z-index:3;
      background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220"><path d="M90 126 C95 90,130 70,174 84 C188 48,246 42,284 76 C328 62,382 86,396 126 Z" fill="%23ffffff"/></svg>');
      background-size:50% 100%; animation:moveClouds 30s linear infinite;
    }

    .city-bg{ position:absolute; left:0; bottom:176px; width:200%; height:360px; z-index:4; opacity:.7; background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380"><rect x="40" y="150" width="100" height="230" fill="%23596f84"/><rect x="180" y="88" width="92" height="292" fill="%2390c7ef"/><rect x="322" y="170" width="126" height="210" fill="%23758c9f"/></svg>'); background-size:50% 100%; animation:moveCity 8s linear forwards; }

    .road-container{ position:absolute; left:0; right:0; bottom:0; height:190px; z-index:7; background:#424242; border-top:8px solid #9da7ae; }
    .road-lines{ position:absolute; top:50%; left:0; width:200%; height:4px; background:repeating-linear-gradient(90deg, #fff 0 40px, transparent 40px 80px); animation:moveRoad 3s linear forwards; }

    .mail-truck{ position:absolute; bottom:14px; left:13vw; width:320px; z-index:10; animation:carBounce .3s infinite alternate; }
    .wheel{ transform-origin:center; animation:spinWheel .7s linear infinite; }

    .flying-letter{
      position:absolute; left:calc(13vw + 155px); bottom:84px; width:52px; height:46px; border-radius:4px; opacity:0; z-index:13;
      background:#fff; border:1px solid #d4af37; box-shadow:0 10px 20px rgba(0,0,0,0.2);
    }
    .fly-action{ animation:letterFly 1.5s cubic-bezier(.2,.8,2,1) forwards; }

    /* =========================================
       PHẦN 2: CUỘN PHIM BẤT TẬN (ĐÃ FIX)
       ========================================= */
    #main-scene { position: absolute; inset:0; z-index: 20; display:none; opacity:0; overflow: hidden; transition: opacity .9s ease;}
    #film-strip-bg{ position:absolute; inset:0; z-index:2; opacity:0; transition:opacity 1s ease; background: rgba(253, 246, 237, 0.7); overflow:hidden; }
    #film-strip-bg.show{ opacity:1; }

    .film-wrapper {
      position: absolute; left: -50vw; width: 300vw; 
      transform: translateY(-50%) rotate(-10deg); display: flex; z-index: 2;
    }
    .fw-1 { top: 15%; }
    .fw-2 { top: 85%; }
    .fw-3 { top: 50%; opacity: 0.1; transform: translateY(-50%) rotate(10deg); z-index: 1; }

    .film-track {
      display: flex; width: max-content; 
      padding: 15px 0; background-color: #1a1a1a; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    
    /* Ảnh hiện ngay lập tức, không chờ hiệu ứng */
    .film-track img {
      width: 320px; height: 200px; object-fit: cover; 
      margin: 0 10px; border: 3px solid #fff; border-radius: 4px;
      opacity: 1 !important; 
    }

    .track-move-left { animation: scrollLeft 40s linear infinite; }
    .track-move-right { animation: scrollRight 45s linear infinite; }

    @keyframes scrollLeft { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    @keyframes scrollRight { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

    /* BAO THƯ & THIỆP */
    #envelope-wrapper{ position:absolute; left:50%; top:50%; width:var(--env-w); height:var(--env-h); transform:translate(-50%,-50%); z-index:8; opacity:0; }
    .fall-animation{ animation:envDrop 1.1s cubic-bezier(.22,1,.32,1) forwards; }
    .env-back{ position:absolute; inset:0; border-radius:18px; background:#b58763; }
    .env-letter{ position:absolute; inset:20px; z-index:2; border-radius:12px; background: #fff; box-shadow:0 10px 20px rgba(0,0,0,0.1); transition:transform .8s ease; }
    .env-flap{ position:absolute; top:0; left:0; width:100%; height:100%; border-left:220px solid transparent; border-right:220px solid transparent; border-top:160px solid #cb9f80; transform-origin:top; transition:transform .7s; z-index:5; }
    .env-flap.open{ transform:rotateX(180deg); z-index:1; }
    .env-letter.slide-out{ transform:translateY(-200px); }

    .heart-btn{ position:absolute; left:50%; top:140px; width:100px; height:100px; transform:translate(-50%,-50%); z-index:10; cursor:pointer; animation: heartbeat 1.2s infinite; }
    .heart-btn svg { fill: #e74c3c; width: 100%; height: 100%; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2)); }
    .btn-text{ position:absolute; top:110%; left:50%; transform:translateX(-50%); white-space:nowrap; font-weight:bold; color:#e74c3c; }

    #invitation-card{ position:absolute; left:50%; top:50%; width:min(90vw,600px); transform:translate(-50%,50%) scale(0.8); opacity:0; z-index:15; background:#fff; padding:20px; border-radius:20px; box-shadow:0 20px 40px rgba(0,0,0,0.2); transition:all 1s ease; }
    #invitation-card.show{ opacity:1; transform:translate(-50%,-50%) scale(1); }
    .card-inner{ border: 2px solid #d4af37; padding: 40px; text-align: center; border-radius: 15px; }

    /* KEYFRAMES */
    @keyframes moveClouds{ to{ transform:translateX(-50%); } }
    @keyframes moveRoad{ to{ transform:translateX(-50%); } }
    @keyframes carBounce{ to{ transform:translateY(-3px); } }
    @keyframes spinWheel{ to{ transform:rotate(360deg); } }
    @keyframes letterFly{ 0%{ opacity:0; transform:scale(0.5); } 20%{ opacity:1; } 100%{ transform:translate(-10vw,-60vh) scale(4) rotate(-10deg); opacity:0; } }
    @keyframes envDrop{ from{ top:-20%; opacity:0; } to{ top:50%; opacity:1; } }
    @keyframes heartbeat{ 0%, 100%{ transform:translate(-50%,-50%) scale(1); } 50%{ transform:translate(-50%,-50%) scale(1.1); } }
    @keyframes sunPulse{ from{ transform:scale(1); } to{ transform:scale(1.1); } }

    @media (max-width: 640px){
      :root{ --env-w:320px; --env-h:200px; }
      .mail-truck{ width:220px; left:5vw; }
      .film-track img { width: 180px; height: 120px; }
    }
  </style>
</head>

        const intro = document.getElementById('intro-scene');
        const main = document.getElementById('main-scene');
        const env = document.getElementById('envelope-wrapper');
        intro.style.opacity = '0';
        main.style.display = 'block';
        setTimeout(() => {
          main.style.opacity = '1';
          env.classList.add('fall-animation');
        }, 100);
      }, 5000);
    };

    function setupInfiniteFilms() {
      // Tạo chuỗi ảnh gốc
      let innerHtml = "";
      photos.forEach(url => {
        innerHtml += `<img src="${url}" alt="Kỷ yếu">`;
      });

      // Nhân đôi để tạo vòng lặp vô tận (Duplicate)
      const finalHtml = innerHtml + innerHtml;

      // Gán vào các track
      ['t1', 't2', 't3'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.innerHTML = finalHtml;
      });
    }

    function triggerOpenAnimation() {
      if (isOpen) return;
      isOpen = true;

      document.getElementById('open-btn').style.display = 'none';
      document.getElementById('popSound').play();
      document.getElementById('bgMusic').play();

      document.getElementById('env-flap').classList.add('open');
      
      setTimeout(() => {
        document.getElementById('env-letter').classList.add('slide-out');
      }, 500);

      setTimeout(() => {
        document.getElementById('envelope-wrapper').style.opacity = '0';
        document.getElementById('film-strip-bg').classList.add('show');
        document.getElementById('invitation-card').classList.add('show');
      }, 1200);
    }
  </script>
</body>
</html>
